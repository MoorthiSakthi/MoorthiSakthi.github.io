<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoorthiSakthi | Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      color: #d4d4d4;
      padding: 2rem 2.5rem;
      min-height: 100vh;
      line-height: 1.8;
    }

    .prompt { color: #00ff41; }

    .link {
      color: #00bfff;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }

    #cursor {
      display: none;
      width: 9px;
      height: 1em;
      background: #d4d4d4;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    #cursor.show { display: inline-block; }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

<div id="terminal"></div>
<span id="cursor"></span>

<script>
  const terminal = document.getElementById('terminal');
  const cursor = document.getElementById('cursor');

  const WORD_SPEED = 60;   // was 120 — 2x faster
  const LINE_PAUSE = 250;  // was 500
  const CMD_PAUSE  = 350;  // was 700

  function words(str) {
    return str.split(' ').map(w => ({ type: 'word', text: w }));
  }

  const script = [
    { type: 'prompt', text: 'root@MoorthiSakthi:~$' },
    { type: 'cmd',    text: 'cd' },
    { type: 'cmd',    text: 'Portfolio' },
    { type: 'newline' },
    { type: 'pause', ms: 150 },

    { type: 'prompt', text: 'root@MoorthiSakthi:~$' },
    { type: 'cmd',    text: 'cat' },
    { type: 'cmd',    text: 'about.txt' },
    { type: 'newline' },
    { type: 'pause', ms: 200 },

    { type: 'blank' },

    ...words("I'm Moorthi , I did my Bachelor's Degree in Bachelor of Science in Chemistry at"),
    { type: 'newline' },
    ...words('Bharathiyar University (Tiruppur , Tamilnadu , INDIA )'),
    { type: 'newline' },

    { type: 'blank' },

    ...words("I'm currently pursuing my master degree in Master of Computer Applications at SRM"),
    { type: 'newline' },
    ...words('Institute of Science and Technology ( Chennai , Tamilnadu , INDIA )'),
    { type: 'newline' },

    { type: 'blank' },

    ...words('Network Engineer with 5 years of experience in routing protocols, switching, and LAN technologies,'),
    { type: 'newline' },
    ...words('dedicated to designing and optimizing secure, scalable networks to drive operational efficiency'),
    { type: 'newline' },
    ...words('and support business goals.'),
    { type: 'newline' },

    { type: 'blank' },

    ...words("Here's my"),
    { type: 'link', text: 'Resume', href: '#', target: '_self' },
    ...words(', if you wanna Hire me.'),
    { type: 'newline' },
    { type: 'blank' },
    { type: 'pause', ms: 150 },

    { type: 'prompt', text: 'root@MoorthiSakthi:~$' },
    { type: 'cmd',    text: 'cat' },
    { type: 'cmd',    text: 'contact.txt' },
    { type: 'newline' },
    { type: 'pause', ms: 200 },

    { type: 'blank' },

    ...words('Feel free to reach me at'),
    { type: 'link', text: 'mmoorthi304@gmail.com', href: 'mailto:mmoorthi304@gmail.com', target: '_self' },
    { type: 'newline' },

    { type: 'blank' },

    ...words('My other social media handles include'),
    { type: 'newline' },

    { type: 'word', text: '#' },
    { type: 'link', text: 'Linkedin',  href: 'https://linkedin.com/in/yourprofile', target: '_blank' },
    { type: 'newline' },

    { type: 'word', text: '#' },
    { type: 'link', text: 'Twitter',   href: 'https://twitter.com/yourhandle',      target: '_blank' },
    { type: 'newline' },

    { type: 'word', text: '#' },
    { type: 'link', text: 'Facebook',  href: 'https://facebook.com/yourprofile',    target: '_blank' },
    { type: 'newline' },

    { type: 'word', text: '#' },
    { type: 'link', text: 'Instagram', href: 'https://instagram.com/yourhandle',    target: '_blank' },
    { type: 'newline' },

    { type: 'blank' },
    { type: 'pause', ms: 150 },

    { type: 'prompt', text: 'root@MoorthiSakthi:~$' },
    { type: 'cmd',    text: 'exit' },
    { type: 'newline' },
    { type: 'blank' },
  ];

  let currentLine = document.createElement('span');
  terminal.appendChild(currentLine);

  function appendToLine(html) {
    const span = document.createElement('span');
    span.innerHTML = html;
    currentLine.appendChild(span);
  }

  function newLine() {
    terminal.appendChild(document.createElement('br'));
    currentLine = document.createElement('span');
    terminal.appendChild(currentLine);
  }

  let idx = 0;

  function next() {
    if (idx >= script.length) {
      cursor.classList.add('show');
      return;
    }

    const token = script[idx++];

    if (token.type === 'pause') {
      setTimeout(next, token.ms);
      return;
    }
    if (token.type === 'blank') {
      terminal.appendChild(document.createElement('br'));
      currentLine = document.createElement('span');
      terminal.appendChild(currentLine);
      setTimeout(next, 40);
      return;
    }
    if (token.type === 'newline') {
      newLine();
      setTimeout(next, 40);
      return;
    }
    if (token.type === 'prompt') {
      appendToLine(`<span class="prompt">${token.text} </span>`);
      setTimeout(next, WORD_SPEED);
      return;
    }
    if (token.type === 'cmd') {
      appendToLine(`${token.text} `);
      setTimeout(next, WORD_SPEED);
      return;
    }
    if (token.type === 'word') {
      appendToLine(`${token.text} `);
      setTimeout(next, WORD_SPEED);
      return;
    }
    if (token.type === 'link') {
      const tgt = token.target === '_blank' ? "target='_blank'" : '';
      appendToLine(`<a class='link' href='${token.href}' ${tgt}>${token.text}</a> `);
      setTimeout(next, WORD_SPEED);
      return;
    }

    next();
  }

  setTimeout(next, 400);
</script>

</body>
</html>
